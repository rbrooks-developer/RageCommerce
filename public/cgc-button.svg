<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 84" width="460" height="84">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6B4E09"/>
      <stop offset="18%"  stop-color="#A87A12"/>
      <stop offset="38%"  stop-color="#C9A024"/>
      <stop offset="55%"  stop-color="#B08818"/>
      <stop offset="75%"  stop-color="#8A650E"/>
      <stop offset="100%" stop-color="#5A3E07"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3A2805"/>
      <stop offset="45%"  stop-color="#7A5C10"/>
      <stop offset="100%" stop-color="#2A1C03"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E8CC50" stop-opacity="0.45"/>
      <stop offset="60%"  stop-color="#E8CC50" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#E8CC50" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-15%" width="110%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
    <filter id="tshadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Outer dark rim with drop shadow -->
  <rect x="3" y="3" width="454" height="78" rx="39" fill="url(#rim)" filter="url(#shadow)"/>

  <!-- Main gold body -->
  <rect x="6" y="6" width="448" height="72" rx="36" fill="url(#gold)"/>

  <!-- Subtle inner highlight border -->
  <rect x="9" y="9" width="442" height="66" rx="34" fill="none"
        stroke="#D4AE2C" stroke-width="1.2" stroke-opacity="0.55"/>

  <!-- Top shine overlay -->
  <rect x="14" y="10" width="432" height="34" rx="32" fill="url(#shine)"/>

  <!-- Text -->
  <text x="230" y="50"
    font-family="Arial, Helvetica, sans-serif"
    font-size="20"
    font-weight="bold"
    letter-spacing="1.8"
    text-anchor="middle"
    fill="#000000"
    filter="url(#tshadow)">CGC Census/Grader Notes</text>
</svg>
