<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Gradient fades from transparent on both ends to bright gold in the middle -->
    <linearGradient id="gFade" x1="0" y1="0" x2="1920" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#C18935" stop-opacity="0"/>
      <stop offset="6%"   stop-color="#C18935" stop-opacity="0.5"/>
      <stop offset="25%"  stop-color="#DDA840" stop-opacity="0.95"/>
      <stop offset="50%"  stop-color="#F0BC50" stop-opacity="1"/>
      <stop offset="72%"  stop-color="#C18935" stop-opacity="0.85"/>
      <stop offset="92%"  stop-color="#C18935" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#C18935" stop-opacity="0"/>
    </linearGradient>

    <!-- Same gradient shifted right for arc 3 which ends off-screen left -->
    <linearGradient id="gFade3" x1="0" y1="0" x2="1700" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#C18935" stop-opacity="0"/>
      <stop offset="8%"   stop-color="#C18935" stop-opacity="0.55"/>
      <stop offset="30%"  stop-color="#DDA840" stop-opacity="0.9"/>
      <stop offset="55%"  stop-color="#F0BC50" stop-opacity="1"/>
      <stop offset="78%"  stop-color="#C18935" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#C18935" stop-opacity="0"/>
    </linearGradient>

    <!-- Blur filters with generous regions to avoid clipping -->
    <filter id="b50" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <filter id="b22" x="-12%" y="-12%" width="124%" height="124%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="b8" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="b3" x="-2%" y="-2%" width="104%" height="104%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="b1">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>

    <!-- Soft radial hotspot to add warmth at the brightest zone -->
    <radialGradient id="hotspot" cx="45%" cy="60%" r="38%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#C18935" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C18935" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ─── Ambient hotspot (very subtle warmth) ─── -->
  <rect width="1920" height="1080" fill="url(#hotspot)"/>

  <!-- ══════════════════════════════════════════════
       ARC 1  —  outermost / lowest start
       Path: lower-left sweeping to upper-right
  ═══════════════════════════════════════════════ -->
  <!-- Outer diffuse glow -->
  <path d="M -60,1240 C 220,1020 920,630 1980,370"
    fill="none" stroke="#C18935" stroke-width="160" opacity="0.06" filter="url(#b50)"/>
  <!-- Mid glow -->
  <path d="M -60,1240 C 220,1020 920,630 1980,370"
    fill="none" stroke="url(#gFade)" stroke-width="55" opacity="0.22" filter="url(#b22)"/>
  <!-- Inner glow -->
  <path d="M -60,1240 C 220,1020 920,630 1980,370"
    fill="none" stroke="url(#gFade)" stroke-width="16" opacity="0.60" filter="url(#b8)"/>
  <!-- Core glow -->
  <path d="M -60,1240 C 220,1020 920,630 1980,370"
    fill="none" stroke="url(#gFade)" stroke-width="5" opacity="0.82" filter="url(#b3)"/>
  <!-- Bright core line -->
  <path d="M -60,1240 C 220,1020 920,630 1980,370"
    fill="none" stroke="#F8D878" stroke-width="1.5" opacity="0.88"/>

  <!-- ══════════════════════════════════════════════
       ARC 2  —  middle arc
  ═══════════════════════════════════════════════ -->
  <path d="M -40,1000 C 160,810 760,420 1850,165"
    fill="none" stroke="#C18935" stroke-width="130" opacity="0.08" filter="url(#b50)"/>
  <path d="M -40,1000 C 160,810 760,420 1850,165"
    fill="none" stroke="url(#gFade)" stroke-width="45" opacity="0.28" filter="url(#b22)"/>
  <path d="M -40,1000 C 160,810 760,420 1850,165"
    fill="none" stroke="url(#gFade)" stroke-width="13" opacity="0.65" filter="url(#b8)"/>
  <path d="M -40,1000 C 160,810 760,420 1850,165"
    fill="none" stroke="url(#gFade)" stroke-width="4" opacity="0.86" filter="url(#b3)"/>
  <path d="M -40,1000 C 160,810 760,420 1850,165"
    fill="none" stroke="#F8D878" stroke-width="1.5" opacity="0.95"/>

  <!-- ══════════════════════════════════════════════
       ARC 3  —  innermost / highest start
  ═══════════════════════════════════════════════ -->
  <path d="M 20,780 C 140,600 580,218 1660,-30"
    fill="none" stroke="#C18935" stroke-width="100" opacity="0.07" filter="url(#b50)"/>
  <path d="M 20,780 C 140,600 580,218 1660,-30"
    fill="none" stroke="url(#gFade3)" stroke-width="35" opacity="0.25" filter="url(#b22)"/>
  <path d="M 20,780 C 140,600 580,218 1660,-30"
    fill="none" stroke="url(#gFade3)" stroke-width="10" opacity="0.58" filter="url(#b8)"/>
  <path d="M 20,780 C 140,600 580,218 1660,-30"
    fill="none" stroke="url(#gFade3)" stroke-width="3.5" opacity="0.80" filter="url(#b3)"/>
  <path d="M 20,780 C 140,600 580,218 1660,-30"
    fill="none" stroke="#F8D878" stroke-width="1" opacity="0.85"/>

  <!-- ══════════════════════════════════════════════
       PARTICLES  —  scattered gold dust near arcs
  ═══════════════════════════════════════════════ -->
  <!-- Along arc 1 band -->
  <circle cx="110"  cy="1155" r="1.5" fill="#E8A840" opacity="0.55" filter="url(#b1)"/>
  <circle cx="195"  cy="1090" r="1.0" fill="#F8D878" opacity="0.75"/>
  <circle cx="310"  cy="1015" r="2.0" fill="#C18935" opacity="0.40" filter="url(#b1)"/>
  <circle cx="440"  cy="945"  r="1.2" fill="#E8A840" opacity="0.65"/>
  <circle cx="575"  cy="876"  r="1.8" fill="#F8D878" opacity="0.50" filter="url(#b1)"/>
  <circle cx="710"  cy="812"  r="1.0" fill="#C18935" opacity="0.70"/>
  <circle cx="855"  cy="750"  r="1.5" fill="#E8A840" opacity="0.45" filter="url(#b1)"/>
  <circle cx="1000" cy="692"  r="2.2" fill="#F8D878" opacity="0.35"/>
  <circle cx="1155" cy="638"  r="1.0" fill="#C18935" opacity="0.60"/>
  <circle cx="1300" cy="588"  r="1.5" fill="#E8A840" opacity="0.50" filter="url(#b1)"/>
  <circle cx="1460" cy="540"  r="1.2" fill="#F8D878" opacity="0.65"/>
  <circle cx="1620" cy="498"  r="1.8" fill="#C18935" opacity="0.40"/>
  <circle cx="1780" cy="460"  r="1.0" fill="#E8A840" opacity="0.55" filter="url(#b1)"/>
  <circle cx="1900" cy="428"  r="1.5" fill="#F8D878" opacity="0.30"/>

  <!-- Along arc 2 band -->
  <circle cx="90"   cy="960"  r="1.2" fill="#E8A840" opacity="0.50"/>
  <circle cx="210"  cy="892"  r="1.8" fill="#F8D878" opacity="0.68" filter="url(#b1)"/>
  <circle cx="345"  cy="822"  r="1.0" fill="#C18935" opacity="0.55"/>
  <circle cx="480"  cy="758"  r="2.0" fill="#E8A840" opacity="0.38" filter="url(#b1)"/>
  <circle cx="618"  cy="696"  r="1.2" fill="#F8D878" opacity="0.72"/>
  <circle cx="760"  cy="636"  r="1.5" fill="#C18935" opacity="0.45" filter="url(#b1)"/>
  <circle cx="905"  cy="580"  r="1.0" fill="#E8A840" opacity="0.60"/>
  <circle cx="1055" cy="528"  r="1.8" fill="#F8D878" opacity="0.42"/>
  <circle cx="1210" cy="478"  r="1.2" fill="#C18935" opacity="0.55" filter="url(#b1)"/>
  <circle cx="1365" cy="432"  r="1.5" fill="#E8A840" opacity="0.48"/>
  <circle cx="1520" cy="390"  r="1.0" fill="#F8D878" opacity="0.62"/>
  <circle cx="1680" cy="352"  r="2.0" fill="#C18935" opacity="0.35" filter="url(#b1)"/>
  <circle cx="1820" cy="320"  r="1.2" fill="#E8A840" opacity="0.45"/>

  <!-- Along arc 3 band -->
  <circle cx="75"   cy="742"  r="1.5" fill="#E8A840" opacity="0.58" filter="url(#b1)"/>
  <circle cx="180"  cy="680"  r="1.0" fill="#F8D878" opacity="0.72"/>
  <circle cx="292"  cy="620"  r="1.8" fill="#C18935" opacity="0.42" filter="url(#b1)"/>
  <circle cx="410"  cy="562"  r="1.2" fill="#E8A840" opacity="0.60"/>
  <circle cx="532"  cy="506"  r="1.5" fill="#F8D878" opacity="0.48"/>
  <circle cx="660"  cy="452"  r="1.0" fill="#C18935" opacity="0.65" filter="url(#b1)"/>
  <circle cx="795"  cy="400"  r="2.0" fill="#E8A840" opacity="0.38"/>
  <circle cx="935"  cy="350"  r="1.2" fill="#F8D878" opacity="0.55"/>
  <circle cx="1078" cy="304"  r="1.5" fill="#C18935" opacity="0.45" filter="url(#b1)"/>
  <circle cx="1225" cy="260"  r="1.0" fill="#E8A840" opacity="0.62"/>
  <circle cx="1375" cy="220"  r="1.8" fill="#F8D878" opacity="0.40"/>
  <circle cx="1520" cy="182"  r="1.2" fill="#C18935" opacity="0.50" filter="url(#b1)"/>

  <!-- Stray sparkles scattered off the arcs -->
  <circle cx="60"   cy="1080" r="1.0" fill="#C18935" opacity="0.30"/>
  <circle cx="145"  cy="840"  r="1.5" fill="#E8A840" opacity="0.25" filter="url(#b1)"/>
  <circle cx="270"  cy="1140" r="1.2" fill="#F8D878" opacity="0.20"/>
  <circle cx="520"  cy="1020" r="1.0" fill="#C18935" opacity="0.28"/>
  <circle cx="680"  cy="920"  r="2.0" fill="#E8A840" opacity="0.18" filter="url(#b1)"/>
  <circle cx="830"  cy="850"  r="1.0" fill="#F8D878" opacity="0.30"/>
  <circle cx="970"  cy="760"  r="1.5" fill="#C18935" opacity="0.22"/>
  <circle cx="1130" cy="700"  r="1.0" fill="#E8A840" opacity="0.28" filter="url(#b1)"/>
  <circle cx="1290" cy="640"  r="1.8" fill="#F8D878" opacity="0.20"/>
  <circle cx="1450" cy="580"  r="1.0" fill="#C18935" opacity="0.25"/>
  <circle cx="1620" cy="525"  r="1.5" fill="#E8A840" opacity="0.22" filter="url(#b1)"/>
  <circle cx="1800" cy="470"  r="1.0" fill="#F8D878" opacity="0.28"/>
  <circle cx="50"   cy="640"  r="1.2" fill="#C18935" opacity="0.35" filter="url(#b1)"/>
  <circle cx="165"  cy="560"  r="1.0" fill="#E8A840" opacity="0.30"/>
  <circle cx="380"  cy="440"  r="1.5" fill="#F8D878" opacity="0.25" filter="url(#b1)"/>
  <circle cx="250"  cy="510"  r="1.0" fill="#C18935" opacity="0.32"/>
</svg>
